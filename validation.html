<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFmpeg Command Validator</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    p  { font-size: 13px; color: #666; margin-bottom: 16px; }
    textarea { width: 100%; height: 100px; font-family: monospace; font-size: 13px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; }
    button { margin-top: 8px; padding: 8px 20px; background: #5B4FCF; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    button:hover { opacity: 0.85; }
    #messages { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
    .msg { padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.5; }
    .msg code { font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.08); padding: 1px 4px; border-radius: 3px; }
    .msg-error   { background: #FEF2F2; border: 1px solid #FECACA; color: #7F1D1D; }
    .msg-warning { background: #FFFBEB; border: 1px solid #FCD34D; color: #78350F; }
    .msg-info    { background: #EFF6FF; border: 1px solid #BFDBFE; color: #1E3A8A; }
    .msg-success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #14532D; }
  </style>
</head>
<body>
  <h1>FFmpeg Command Validator</h1>
  <p>Paste your ffmpeg command and press Validate.</p>

  <textarea
    id="cmd"
    spellcheck="false"
    placeholder="ffmpeg -y -hide_banner -i ${i} -c:v h264_nvenc -c:a copy -f mpegts ${o}"></textarea>
  <br>
  <button onclick="runValidation()">Validate</button>

  <div id="messages"></div>

  <script type="module">
    import { validateRaw } from './fflint/validate-raw.js'

    const ICONS     = { error: '⛔', warning: '⚠️', info: 'ℹ️' }
    const MSG_CLASS = { error: 'msg-error', warning: 'msg-warning', info: 'msg-info' }

    function renderResults(results) {
      const list = document.getElementById('messages')
      list.innerHTML = ''
      if (results.length === 0) {
        list.innerHTML = '<div class="msg msg-success">✅ No issues found.</div>'
        return
      }
      for (const r of results) {
        const div = document.createElement('div')
        div.className = 'msg ' + (MSG_CLASS[r.severity] || 'msg-info')
        div.innerHTML = (ICONS[r.severity] || 'ℹ️') + ' ' + r.message
        list.appendChild(div)
      }
    }

    window.runValidation = function () {
      const raw = document.getElementById('cmd').value.trim()
      renderResults(validateRaw(raw))
    }

    document.getElementById('cmd').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); window.runValidation() }
    })
  </script>
</body>
</html>
